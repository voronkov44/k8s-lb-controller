apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: k8s-lb-controller
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: k8s-lb-controller
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: k8s-lb-controller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: k8s-lb-controller
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        env:
        - name: K8S_LB_CONTROLLER_METRICS_ADDR
          value: ":8080"
        - name: K8S_LB_CONTROLLER_HEALTH_ADDR
          value: ":8081"
        - name: K8S_LB_CONTROLLER_LEADER_ELECT
          value: "true"
        - name: K8S_LB_CONTROLLER_LOAD_BALANCER_CLASS
          value: "iedge.local/service-lb"
        - name: K8S_LB_CONTROLLER_IP_POOL
          value: "203.0.113.10,203.0.113.11,203.0.113.12"
        - name: K8S_LB_CONTROLLER_REQUEUE_AFTER
          value: "30s"
        - name: K8S_LB_CONTROLLER_LOG_LEVEL
          value: "info"
        - name: K8S_LB_CONTROLLER_HAPROXY_CONFIG_PATH
          value: "/tmp/k8s-lb-controller-haproxy.cfg"
        - name: K8S_LB_CONTROLLER_HAPROXY_VALIDATE_COMMAND
          value: ""
        - name: K8S_LB_CONTROLLER_HAPROXY_RELOAD_COMMAND
          value: ""
        image: controller:latest
        imagePullPolicy: IfNotPresent
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: probes
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      volumes:
      - emptyDir: {}
        name: tmp
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
