apiVersion: v1
kind: Namespace
metadata:
  name: k8s-lb-controller-smoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: k8s-lb-controller-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: k8s-lb-controller-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-client
  template:
    metadata:
      labels:
        app: demo-client
    spec:
      containers:
        - name: toolbox
          image: busybox:1.37
          command:
            - sh
            - -ec
            - sleep infinity
---
apiVersion: v1
kind: Service
metadata:
  name: demo-lb
  namespace: k8s-lb-controller-smoke
spec:
  type: LoadBalancer
  loadBalancerClass: iedge.local/service-lb
  selector:
    app: demo
  ports:
    - port: 80
      targetPort: 80
