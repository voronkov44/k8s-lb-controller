nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/voronkov44/k8s-lb-controller
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
affinity: {}
priorityClassName: ""

# These tolerations match the current Kustomize deployment and let the controller
# run on control-plane nodes in small local clusters like kind.
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

# Keep this greater than or equal to controller.gracefulShutdownTimeout so
# Kubernetes does not force-stop the pod before the controller shuts down cleanly.
terminationGracePeriodSeconds: 20

controller:
  providerMode: local-haproxy
  leaderElection: true
  loadBalancerClass: iedge.local/service-lb
  ipPool:
    - 203.0.113.10
    - 203.0.113.11
    - 203.0.113.12
  requeueAfter: 30s
  # Uses Go duration syntax. Keep terminationGracePeriodSeconds greater than or
  # equal to this timeout so controller-runtime can finish graceful shutdown.
  gracefulShutdownTimeout: 15s
  logLevel: info
  dataplane:
    apiURL: ""
    apiTimeout: 10s
  haproxy:
    configPath: /tmp/k8s-lb-controller-haproxy.cfg
    validateCommand: ""
    reloadCommand: ""

dataplane:
  enabled: false
  replicaCount: 1
  hostNetwork: true
  shareProcessNamespace: true
  image:
    repository: ghcr.io/voronkov44/k8s-lb-controller-dataplane
    pullPolicy: IfNotPresent
    tag: ""
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsUser: 0
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_ADMIN
  http:
    port: 8090
    # Leave empty to derive K8S_LB_DATAPLANE_HTTP_ADDR from dataplane.http.port.
    addr: ""
  interface: eth0
  ipAttach:
    enabled: true
    # netlink is the stage-5 default; exec keeps the stage-4 command-based fallback.
    mode: netlink
    command: /sbin/ip
    cidrSuffix: 32
  haproxy:
    image:
      repository: ghcr.io/voronkov44/k8s-lb-controller-dataplane
      pullPolicy: IfNotPresent
      tag: ""
    configPath: /var/run/k8s-lb-dataplane/haproxy.cfg
    pidFile: /var/run/k8s-lb-dataplane/haproxy.pid
    validateCommand: haproxy -c -f {{config}}
    reloadCommand: >-
      sh -ec 'pid="$(cat /var/run/k8s-lb-dataplane/haproxy.pid 2>/dev/null || true)";
      [ -n "$pid" ] || exit 0; kill -USR2 "$pid"'
    securityContext:
      runAsUser: 0
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
    resources:
      limits:
        cpu: 250m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  logLevel: info
  gracefulShutdownTimeout: 15s
  terminationGracePeriodSeconds: 20
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

metrics:
  # The chart renders K8S_LB_CONTROLLER_METRICS_ADDR as :<port> and uses the
  # same port for the container and optional metrics Service.
  port: 8080
  service:
    enabled: true
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    namespace: ""
    annotations: {}
    labels: {}
    interval: ""
    scrapeTimeout: ""
    path: /metrics
    scheme: http

health:
  # The chart renders K8S_LB_CONTROLLER_HEALTH_ADDR as :<port> and uses the
  # same port for the health and readiness probes.
  port: 8081
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

extraEnv: []
