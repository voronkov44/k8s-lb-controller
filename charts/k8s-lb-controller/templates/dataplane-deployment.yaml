{{- if .Values.dataplane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-lb-controller.dataplaneFullname" . }}
  labels:
    {{- include "k8s-lb-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: dataplane
spec:
  replicas: {{ .Values.dataplane.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-lb-controller.dataplaneSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-lb-controller.dataplaneSelectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: dataplane
    spec:
      automountServiceAccountToken: false
      hostNetwork: {{ ternary "true" "false" .Values.dataplane.hostNetwork }}
      {{- if .Values.dataplane.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      shareProcessNamespace: {{ ternary "true" "false" .Values.dataplane.shareProcessNamespace }}
      terminationGracePeriodSeconds: {{ .Values.dataplane.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.dataplane.podSecurityContext | nindent 8 }}
      containers:
        - name: dataplane
          image: {{ include "k8s-lb-controller.dataplaneImage" . | quote }}
          imagePullPolicy: {{ .Values.dataplane.image.pullPolicy }}
          command:
            - /dataplane
          env:
            - name: K8S_LB_DATAPLANE_HTTP_ADDR
              value: {{ include "k8s-lb-controller.dataplaneHTTPAddr" . | quote }}
            - name: K8S_LB_DATAPLANE_HAPROXY_CONFIG_PATH
              value: {{ .Values.dataplane.haproxy.configPath | quote }}
            - name: K8S_LB_DATAPLANE_HAPROXY_VALIDATE_COMMAND
              value: {{ .Values.dataplane.haproxy.validateCommand | quote }}
            - name: K8S_LB_DATAPLANE_HAPROXY_RELOAD_COMMAND
              value: {{ .Values.dataplane.haproxy.reloadCommand | quote }}
            - name: K8S_LB_DATAPLANE_HAPROXY_PID_FILE
              value: {{ .Values.dataplane.haproxy.pidFile | quote }}
            - name: K8S_LB_DATAPLANE_LOG_LEVEL
              value: {{ .Values.dataplane.logLevel | quote }}
            - name: K8S_LB_DATAPLANE_GRACEFUL_SHUTDOWN_TIMEOUT
              value: {{ .Values.dataplane.gracefulShutdownTimeout | quote }}
            - name: K8S_LB_DATAPLANE_IP_ATTACH_ENABLED
              value: {{ ternary "true" "false" .Values.dataplane.ipAttach.enabled | quote }}
            - name: K8S_LB_DATAPLANE_IP_ATTACH_MODE
              value: {{ .Values.dataplane.ipAttach.mode | quote }}
            - name: K8S_LB_DATAPLANE_INTERFACE
              value: {{ .Values.dataplane.interface | quote }}
            - name: K8S_LB_DATAPLANE_IP_COMMAND
              value: {{ .Values.dataplane.ipAttach.command | quote }}
            - name: K8S_LB_DATAPLANE_IP_CIDR_SUFFIX
              value: {{ .Values.dataplane.ipAttach.cidrSuffix | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.dataplane.http.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.dataplane.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.dataplane.resources | nindent 12 }}
          volumeMounts:
            - name: runtime-dir
              mountPath: {{ dir .Values.dataplane.haproxy.configPath | quote }}
        - name: haproxy
          image: {{ include "k8s-lb-controller.dataplaneHAProxyImage" . | quote }}
          imagePullPolicy: {{ .Values.dataplane.haproxy.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              while [ ! -s {{ .Values.dataplane.haproxy.configPath | quote }} ]; do
                sleep 0.2
              done
              exec haproxy -W -db -f {{ .Values.dataplane.haproxy.configPath | quote }} -p {{ .Values.dataplane.haproxy.pidFile | quote }}
          securityContext:
            {{- toYaml .Values.dataplane.haproxy.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.dataplane.haproxy.resources | nindent 12 }}
          volumeMounts:
            - name: runtime-dir
              mountPath: {{ dir .Values.dataplane.haproxy.configPath | quote }}
      volumes:
        - name: runtime-dir
          emptyDir: {}
      {{- with .Values.dataplane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataplane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataplane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
